<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f7f5ef" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0e1310" media="(prefers-color-scheme: dark)" />
    <title>Investor Profile</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Set the saved theme before first paint to avoid a flash. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('ip-theme');
          if (t !== 'light' && t !== 'dark') t = 'light';
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
