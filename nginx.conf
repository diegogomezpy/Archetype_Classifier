server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Content-hashed build assets — cache hard.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA: every other path falls back to the app shell.
  location / {
    try_files $uri $uri/ /index.html;
  }

  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types text/css application/javascript application/json image/svg+xml;
}
